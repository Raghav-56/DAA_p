<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Rank Cards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css?v=4" />
  </head>
  <body>
    <div class="bg-shape bg-a"></div>
    <div class="bg-shape bg-b"></div>

    <main class="shell">
      <header class="hero">
        <p class="kicker">DAA Ranking Demo</p>
        <h1>Sort products and show ranked cards</h1>
        <p class="sub">Ranking Amazon products using Sorting algorithms.</p>
      </header>

      <section class="panel">
        <form id="query-form" class="controls">
          <label>
            Strategy
            <select id="strategy" name="strategy">
              <option value="price_desc" selected>Price Descending</option>
              <option value="price_asc">Price Ascending</option>
              <option value="rating_desc">Rating Descending</option>
              <option value="rating_asc">Rating Ascending</option>
              <option value="reviews_desc">Reviews Descending</option>
              <option value="discount_desc">Discount % Descending</option>
            </select>
          </label>

          <label>
            Algorithm
            <select id="algorithm" name="algorithm">
              <option value="merge_sort" selected>Merge Sort</option>
              <option value="quick_sort">Quick Sort</option>
            </select>
          </label>

          <label>
            Top K
            <input id="k" name="k" type="number" min="1" max="50" value="10" />
          </label>

          <button type="submit">Rank Products</button>
        </form>

        <div class="toolbar">
          <div id="query-summary" class="query-summary">Query: not run yet</div>
          <div class="view-modes" role="group" aria-label="Result view mode">
            <button type="button" class="mode-btn" data-view="grid">Grid</button>
            <button type="button" class="mode-btn" data-view="list">List</button>
            <button type="button" class="mode-btn" data-view="table">Table</button>
          </div>
        </div>

        <div class="discover-tools">
          <label class="search-wrap">
            <span>Search in loaded results</span>
            <input
              id="search-input"
              type="text"
              placeholder="Try laptop, camera, sony..."
              autocomplete="off"
            />
          </label>

          <div class="density-switch" role="group" aria-label="Display density">
            <button type="button" class="density-btn" data-density="comfortable">Comfortable</button>
            <button type="button" class="density-btn" data-density="compact">Compact</button>
          </div>

          <div class="compare-actions">
            <button type="button" id="compare-toggle" class="ghost-btn" disabled>Compare Selected (0)</button>
            <button type="button" id="clear-selection" class="ghost-btn" disabled>Clear</button>
          </div>
        </div>

        <div id="category-chips" class="chips" aria-label="Category filter chips"></div>

        <div id="status" class="status">Ready.</div>
      </section>

      <section id="results" class="results results-grid" aria-live="polite"></section>

      <section id="compare-panel" class="compare-panel is-hidden" aria-live="polite">
        <div class="compare-head">
          <h2>Compare selected products</h2>
          <p id="compare-summary">Select 2 to 4 products from results to compare.</p>
        </div>
        <div id="compare-results"></div>
      </section>
    </main>

    <template id="card-template">
      <article class="card">
        <div class="thumb-wrap">
          <img class="thumb" alt="Product image" loading="lazy" />
          <span class="rank-chip"></span>
          <label class="select-pill">
            <input class="compare-check" type="checkbox" />
            <span>Select</span>
          </label>
        </div>
        <div class="card-body">
          <h2 class="title"></h2>
          <p class="price-row">
            <span class="price"></span>
            <span class="original"></span>
          </p>
          <p class="meta"></p>
          <div class="badges"></div>
          <a class="link" target="_blank" rel="noopener noreferrer">Open product</a>
        </div>
      </article>
    </template>

    <script src="/static/app.js?v=4"></script>
  </body>
</html>
